<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Cassandra - Page not found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/tokens.css"/>
  <style>
    body {
      background: var(--color-background-secondary, #f3f1ed);
      color: var(--color-text-primary);
      font-family: var(--font-sans);
      max-width: 680px;
      margin: 0 auto;
      padding: var(--space-xl) var(--space-lg) 4rem;
      line-height: 1.6;
    }
    .err-masthead {
      font-family: var(--font-serif);
      font-size: clamp(32px, 7vw, 48px);
      font-weight: 600;
      letter-spacing: 0.02em;
      margin: 0 0 var(--space-md);
      padding-bottom: var(--space-sm);
      border-bottom: 2px solid var(--color-text-primary);
    }
    .err-code { font-family: var(--font-mono); font-size: 12px; color: var(--color-text-secondary); margin-bottom: var(--space-lg); }
    .err-block { margin-bottom: var(--space-lg); }
    .err-block h2 { font-family: var(--font-serif); font-size: 20px; margin: 0 0 var(--space-xs); }
    .err-block p { margin: 0; color: var(--color-text-secondary); font-size: var(--type-body); }
    .err-home {
      display: inline-block;
      margin-top: var(--space-lg);
      font-family: var(--font-sans);
      font-size: var(--type-body);
      color: var(--color-text-primary);
      text-decoration: none;
      border-bottom: 1px solid var(--color-border-secondary);
    }
  </style>
</head>
<body>
  <p class="err-code">404</p>
  <h1 class="err-masthead">Cassandra</h1>

  <div class="err-block">
    <h2>Page not found</h2>
    <p>This edition or route does not exist on the desk.</p>
  </div>

  <div class="err-block">
    <h2>找不到页面</h2>
    <p>此版本或路径在系统中不存在。</p>
  </div>

  <div class="err-block">
    <h2>Halaman tidak dijumpai</h2>
    <p>Edisi atau laluan ini tiada di meja riset.</p>
  </div>

  <a href="/" class="err-home">← Return to desk home</a>
</body>
</html>
