<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title id="page-title">Coming Soon — Cassandra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/tokens.css"/>
  <link rel="stylesheet" href="/static/styles.css"/>
</head>
<body class="home-page">
<div class="home-wrap" style="max-width:680px; margin:0 auto; padding:3rem 2rem;">

  <div style="display:flex; justify-content:space-between; align-items:center;
              border-bottom:1px solid var(--border); padding-bottom:0.75rem; margin-bottom:2.5rem;">
    <a href="/" class="home-logo cp" style="font-family:var(--font-serif);
       font-size:18px; font-weight:700; color:var(--ink); text-decoration:none;">
      Cassandra
    </a>
    <div style="display:flex; gap:10px;">
      <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme"
              onclick="toggleTheme()" style="font-size:13px; padding:4px 10px;">
        ☀ / ☾
      </button>
      <a href="/" class="icon-btn" style="font-size:13px; padding:4px 14px;
         border:1px solid var(--border); border-radius:3px; color:var(--ink);
         text-decoration:none; font-family:var(--font-serif);">
        ← Home
      </a>
    </div>
  </div>

  <div id="status-badge" style="display:inline-block; font-size:10px;
       letter-spacing:0.12em; text-transform:uppercase; color:var(--ink-3);
       border:1px solid var(--border); padding:3px 10px; margin-bottom:1.5rem;
       font-family:var(--font-serif); font-style:italic;">
    Under Development
  </div>

  <h1 id="page-headline" style="font-family:var(--font-serif); font-size:clamp(28px,6vw,48px);
      font-weight:700; line-height:1.1; color:var(--ink); margin-bottom:1rem;">
    This feature is being built.
  </h1>

  <p id="page-body" style="font-size:15px; color:var(--ink-2); line-height:1.7;
     margin-bottom:1.5rem; font-family:var(--font-sans);">
    We're wiring this up. Check back soon.
  </p>

  <div id="demo-slot" hidden style="border:1px solid var(--border);
       border-top:3px solid var(--border-hvy); background:var(--bg-inset);
       padding:1.25rem; margin-bottom:1.5rem; border-radius:2px;">
    <div style="font-size:10px; letter-spacing:0.1em; text-transform:uppercase;
         color:var(--ink-3); margin-bottom:0.75rem;">Demo — static snapshot</div>
    <div id="demo-content"></div>
  </div>

  <div style="display:flex; flex-wrap:wrap; gap:10px; margin-top:2rem;
              border-top:1px solid var(--border); padding-top:1.25rem;">
    <a href="/" style="font-family:var(--font-serif); font-size:13px;
       border:1px solid var(--border-hvy); padding:6px 18px; color:var(--bg);
       text-decoration:none; background:var(--ink);">
      ← Back to Home
    </a>
    <a href="/newspaper-report" style="font-family:var(--font-serif); font-size:13px;
       border:1px solid var(--border); padding:6px 18px; color:var(--ink);
       text-decoration:none;">
      Today's edition
    </a>
    <a href="/pricing" style="font-family:var(--font-serif); font-size:13px;
       border:1px solid var(--border); padding:6px 18px; color:var(--ink);
       text-decoration:none;">
      Plans
    </a>
  </div>

  <p style="font-size:10px; color:var(--ink-3); margin-top:2rem; font-style:italic;">
    CASSANDRA · crash.netie.ai · research desk
  </p>
</div>

<script src="/static/config.js"></script>
<script src="/static/common.js"></script>
<script>
function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  try { localStorage.setItem('cassandra-theme', next); } catch(e) {}
}
(function(){
  const s = (function(){ try{ return localStorage.getItem('cassandra-theme'); }catch(e){return null;} })();
  document.documentElement.setAttribute('data-theme',
    s || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
})();

const PAGE_CONFIGS = {
  'agent-chat': {
    title:    'Agent Chat — Cassandra',
    badge:    'Under Development',
    headline: 'AI research agent is coming.',
    body:     'The Cassandra agent will answer questions about the current CRS, factor breakdown, and historical analogs using live pipeline data. Available to Pro and API subscribers at launch. Ungated access is not available in this build.',
    mode:     'dev',
  },
  'platform': {
    title:    'Platform — Cassandra',
    badge:    'Under Development',
    headline: 'Platform tools are being wired.',
    body:     'Scenario grids, watchlist price levels, and custom basket configuration are coming to Pro Desk and API tiers. These features depend on live data feeds being connected.',
    mode:     'dev',
  },
  'stock-agent': {
    title:    'Stock Agent — Cassandra',
    badge:    'Demo Mode',
    headline: 'Stock-level risk reports.',
    body:     'The stock agent scores individual tickers against the macro CRS. Below is a static demo snapshot. Live scoring requires an API subscription.',
    mode:     'demo',
  },
  'docs-api': {
    title:    'API Reference — Cassandra',
    badge:    'Under Development',
    headline: 'API documentation is being written.',
    body:     'Endpoints, authentication, response schemas, and webhook configuration will be documented here. Current available endpoint: GET /api/score (no auth, 2-day delay). Full feed on API tier.',
    mode:     'dev',
  },
  'docs-institutional': {
    title:    'Institutional Feed — Cassandra',
    badge:    'Under Development',
    headline: 'Institutional data feed.',
    body:     'White-label CRS feed, custom basket scoring, and bulk historical export. Contact us via the API tier to discuss institutional access.',
    mode:     'dev',
  },
};

function stockDemoHtml(ticker) {
  const sym = (ticker || 'NOW').toUpperCase();
  return `<div style="font-family:var(--font-mono); font-size:12px; color:var(--ink-2);">
    <div><span style="color:var(--ink-3);">ticker</span>   ${sym}</div>
    <div><span style="color:var(--ink-3);">crs_adj</span>  42.1</div>
    <div><span style="color:var(--ink-3);">band</span>     Awareness</div>
    <div><span style="color:var(--ink-3);">phase</span>    Distribution Range</div>
    <div><span style="color:var(--ink-3);">asof</span>     2026-06-25 (static)</div>
    <div style="margin-top:8px; color:var(--ink-3); font-style:italic; font-size:11px;">
      Live data available on API tier →
    </div>
  </div>`;
}

(function init() {
  const params = new URLSearchParams(location.search);
  const key    = params.get('page') || '';
  const ticker = params.get('ticker') || '';
  const cfg    = PAGE_CONFIGS[key] || {};

  if (cfg.title)    document.getElementById('page-title').textContent    = cfg.title;
  if (cfg.badge)    document.getElementById('status-badge').textContent  = cfg.badge;
  if (cfg.headline) document.getElementById('page-headline').textContent = cfg.headline;
  if (cfg.body)     document.getElementById('page-body').textContent     = cfg.body;

  if (cfg.mode === 'demo' || key === 'stock-agent') {
    const slot = document.getElementById('demo-slot');
    slot.hidden = false;
    document.getElementById('demo-content').innerHTML = stockDemoHtml(ticker);
    document.getElementById('status-badge').textContent = 'Demo Mode';
    document.getElementById('status-badge').style.borderColor = 'var(--border-hvy)';
    document.getElementById('status-badge').style.color = 'var(--ink)';
    if (ticker) {
      document.getElementById('page-title').textContent = `${ticker.toUpperCase()} — Stock Agent Demo`;
    }
  }
})();
</script>
</body>
</html>
