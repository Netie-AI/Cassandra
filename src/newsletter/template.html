<div style="max-width:600px;margin:0 auto;font-family:'DM Sans',Arial,sans-serif;">
  <div style="border-bottom:2px solid #1a1a1a;padding:16px 0;">
    <span style="font-family:Georgia,serif;font-size:22px;font-weight:700;">Cassandra</span>
    <span style="font-size:11px;color:#666;margin-left:12px;">by Netie AI · {date}</span>
  </div>
  <div style="margin:24px 0;padding:16px;border-left:4px solid {crs_color};">
    <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:#666;">Capital Risk Score</div>
    <div style="font-size:42px;font-family:'IBM Plex Mono',monospace;font-weight:700;color:{crs_color};">{crs}</div>
    <div style="font-size:13px;color:#444;">{phase} · {phase_conf}% confidence</div>
  </div>
  <div style="font-size:15px;line-height:1.7;color:#1a1a1a;">{body_excerpt}</div>
  <div style="margin:28px 0;">
    <a href="https://crash.netie.ai/newspaper-report" style="background:#1a1a1a;color:#fff;padding:12px 24px;text-decoration:none;font-size:13px;font-family:'DM Sans',Arial,sans-serif;display:inline-block;">
      Read Full Report →
    </a>
  </div>
  <div style="border-top:1px solid #e5e5e5;padding:16px 0;font-size:12px;color:#666;">
    Share this edition:
    <a href="{share_whatsapp}" style="margin:0 8px;color:#1a1a1a;">WhatsApp</a>
    <a href="{share_x}" style="margin:0 8px;color:#1a1a1a;">X / Twitter</a>
    <a href="https://crash.netie.ai/newspaper-report" style="margin:0 8px;color:#1a1a1a;">View online</a>
  </div>
  <div style="font-size:11px;color:#999;border-top:1px solid #e5e5e5;padding:12px 0;">
    Cassandra is a research tool. Not financial advice.
    <a href="https://crash.netie.ai/api/digest/unsubscribe?token={unsub_token}" style="color:#999;margin-left:8px;">Unsubscribe</a>
  </div>
</div>
